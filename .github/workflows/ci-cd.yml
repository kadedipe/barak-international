# ============================================
# BARAK INTERNATIONAL - DEPLOY WITH PEACEIRIS
# Most popular GitHub Actions deployment
# ============================================

name: Deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Netlify
        uses: peaceiris/actions-netlify@v2
        with:
          # Your Netlify Site ID
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          # Your Netlify Auth Token
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          # Directory to deploy
          publish_dir: .
          # Production branch
          production_branch: main
          # Enable pull request comments
          enable_pull_request_comment: true
          # Deployment message
          deploy_message: "Deploy from GitHub Actions - ${{ github.sha }}"
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

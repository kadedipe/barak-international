# ============================================
# NETLIFY CONFIGURATION FOR BARAK INTERNATIONAL
# ============================================

[build]
  publish = "."

# Custom headers to fix HTML display issues
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"
    Content-Disposition = "inline"
    X-Content-Type-Options = "nosniff"

# Specific fix for documents.html
[[headers]]
  for = "/documents.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"
    Content-Disposition = "inline"

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Documents folder - allow PDF downloads
[[headers]]
  for = "/documents/*"
  [headers.values]
    Content-Disposition = "attachment"
    Content-Type = "application/pdf"
    Cache-Control = "public, max-age=86400"